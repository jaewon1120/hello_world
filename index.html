<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Survival Shooter</title>
    <style>
        body { margin: 0; background: #111; color: white; overflow: hidden; font-family: sans-serif; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
<div id="ui">
    <div id="stats">HP: 3 | Exp: 0 | Level: 1</div>
    <div id="bossTimer"></div>
</div>
<canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let player = { x: canvas.width/2, y: canvas.height/2, hp: 3, level: 1, exp: 0, weapon: 'pistol', ammo: 12 };
let enemies = [];
let bullets = [];
let bossTimer = 120; // 2분
let isMouseDown = false;

// 게임 루프
function update() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // 플레이어 그리기 (마우스 방향)
    ctx.fillStyle = 'blue';
    ctx.fillRect(player.x-10, player.y-10, 20, 20);

    // 사격 (연사 로직)
    if (isMouseDown && player.ammo > 0) {
        if (Math.random() < 0.2) { // 발사 속도 조절
            bullets.push({ x: player.x, y: player.y, vx: (mouseX - player.x)/20, vy: (mouseY - player.y)/20 });
            player.ammo--;
        }
    }

    // 적 스폰
    if (Math.random() < 0.05) spawnEnemy();

    // 업데이트 및 그리기
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        ctx.fillStyle = 'yellow';
        ctx.fillRect(b.x, b.y, 5, 5);
    });

    requestAnimationFrame(update);
}

function spawnEnemy() {
    enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, type: 'normal' });
}

let mouseX = 0, mouseY = 0;
window.addEventListener('mousemove', e => { mouseX = e.clientX; mouseY = e.clientY; });
window.addEventListener('mousedown', () => isMouseDown = true);
window.addEventListener('mouseup', () => isMouseDown = false);

update();
</script>
</body>
</html>
