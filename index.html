<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Survival Arena Complete</title>
    <style>
        body { margin: 0; background: #111; color: #fff; overflow: hidden; }
        canvas { display: block; }
        #ui { position: absolute; top: 10px; left: 10px; pointer-events: none; }
    </style>
</head>
<body>
    <div id="ui">HP: <span id="hp">3</span> | Lv: <span id="lv">1</span></div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

// 게임 설정
let player = { x: canvas.width/2, y: canvas.height/2, hp: 3, speed: 5 };
let enemies = [], bullets = [], particles = [];
let keys = {};

// 3종 몬스터 정의
const enemyTypes = {
    normal: { speed: 2, color: 'red', hp: 1 },
    ranged: { speed: 1.5, color: 'orange', hp: 1 },
    fast: { speed: 4, color: 'pink', hp: 1 }
};

// 몬스터 생성
function spawnEnemy() {
    let type = Object.keys(enemyTypes)[Math.floor(Math.random()*3)];
    enemies.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, ...enemyTypes[type], type });
}

// 게임 루프
function loop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // 1. 플레이어 이동 (WASD)
    if (keys['w']) player.y -= player.speed;
    if (keys['s']) player.y += player.speed;
    if (keys['a']) player.x -= player.speed;
    if (keys['d']) player.x += player.speed;
    ctx.fillStyle = 'blue'; ctx.fillRect(player.x-15, player.y-15, 30, 30);

    // 2. 총알 처리
    bullets.forEach((b, i) => {
        b.x += b.vx; b.y += b.vy;
        ctx.fillStyle = 'yellow'; ctx.fillRect(b.x, b.y, 6, 6);
        
        // 몬스터 충돌 체크
        enemies.forEach((e, ei) => {
            if(Math.hypot(b.x - e.x, b.y - e.y) < 20) {
                enemies.splice(ei, 1);
                bullets.splice(i, 1);
                // 타격 이펙트
                for(let p=0; p<10; p++) particles.push({ x: e.x, y: e.y, vx: (Math.random()-0.5)*5, vy: (Math.random()-0.5)*5, alpha: 1 });
            }
        });
    });

    // 3. 몬스터 로직
    if(Math.random() < 0.03) spawnEnemy();
    enemies.forEach(e => {
        let angle = Math.atan2(player.y - e.y, player.x - e.x);
        e.x += Math.cos(angle) * e.speed;
        e.y += Math.sin(angle) * e.speed;
        ctx.fillStyle = e.color; ctx.fillRect(e.x-15, e.y-15, 30, 30);
    });

    // 4. 이펙트 관리
    particles.forEach((p, i) => {
        p.x += p.vx; p.y += p.vy; p.alpha -= 0.05;
        ctx.fillStyle = `rgba(255, 255, 0, ${p.alpha})`;
        ctx.fillRect(p.x, p.y, 4, 4);
        if(p.alpha <= 0) particles.splice(i, 1);
    });

    requestAnimationFrame(loop);
}

// 입력 처리
window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
window.addEventListener('mousedown', e => {
    let angle = Math.atan2(e.clientY - player.y, e.clientX - player.x);
    bullets.push({ x: player.x, y: player.y, vx: Math.cos(angle)*10, vy: Math.sin(angle)*10 });
});

loop();
</script>
</body>
</html>
