<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Mini Survivor</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #333;
            color: white;
            font-family: sans-serif;
        }
        #gameCanvas {
            display: block;
            background-color: #222;
        }
        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            pointer-events: none; /* 클릭 방지 */
        }
        #controls-hint {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            font-size: 14px;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div id="ui">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">0</span>s</div>
</div>
<div id="controls-hint">WASD to move</div>

<canvas id="gameCanvas"></canvas>

<script>
    // --- 설정 ---
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const timeEl = document.getElementById('time');

    let width, height;
    resize();
    window.addEventListener('resize', resize);

    function resize() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
    }

    let player = { x: width / 2, y: height / 2, radius: 15, speed: 5 };
    let enemies = [];
    let projectiles = [];
    let keys = {};
    let score = 0;
    let gameTime = 0;
    let lastEnemySpawnTime = 0;
    let isGameOver = false;
    let animationId;

    // --- 입력 처리 ---
    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    // --- 게임 객체 생성기 ---
    function spawnEnemy() {
        let side = Math.floor(Math.random() * 4); // 0:top, 1:right, 2:bottom, 3:left
        let ex, ey;
        let r = 20;

        if (side === 0) { ex = Math.random() * width; ey = -r; }
        else if (side === 1) { ex = width + r; ey = Math.random() * height; }
        else if (side === 2) { ex = Math.random() * width; ey = height + r; }
        else { ex = -r; ey = Math.random() * height; }

        enemies.push({ x: ex, y: ey, radius: r, speed: 2.5 });
    }

    function shoot() {
        // 가장 가까운 적 찾기 (간단 버전: 첫 번째 적)
        if (enemies.length > 0) {
            let target = enemies[0];
            let angle = Math.atan2(target.y - player.y, target.x - player.x);
            projectiles.push({
                x: player.x,
                y: player.y,
                radius: 5,
                speed: 10,
                dx: Math.cos(angle) * 10,
                dy: Math.sin(angle) * 10
            });
        }
    }

    // --- 메인 업데이트 루프 ---
    function update(timestamp) {
        if (isGameOver) return;

        ctx.clearRect(0, 0, width, height);

        // 시간 및 점수 업데이트
        gameTime = Math.floor(timestamp / 1000);
        timeEl.innerText = gameTime;

        // 플레이어 이동
        if (keys['KeyW'] && player.y - player.radius > 0) player.y -= player.speed;
        if (keys['KeyS'] && player.y + player.radius < height) player.y += player.speed;
        if (keys['KeyA'] && player.x - player.radius > 0) player.x -= player.speed;
        if (keys['KeyD'] && player.x + player.radius < width) player.x += player.speed;

        // 플레이어 그리기
        ctx.beginPath();
        ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
        ctx.fillStyle = '#00f'; // 파란색
        ctx.fill();
        ctx.closePath();

        // 자동 공격 (매초)
        if (timestamp - lastEnemySpawnTime > 1000) { // 편의상 스폰 타이머 재활용
             shoot();
             lastEnemySpawnTime = timestamp;
        }
        
        // 자동 공격 (고정 딜레이) - 위 스폰 타이밍과 겹쳐서 수정
        // 더 정확한 쿨타임 관리 필요, 일단 간단 버전 유지

        // 투사체 관리
        for (let i = projectiles.length - 1; i >= 0; i--) {
            let p = projectiles[i];
            p.x += p.dx;
            p.y += p.dy;

            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#ff0'; // 노란색
            ctx.fill();
            ctx.closePath();

            // 화면 밖 투사체 제거
            if (p.x < 0 || p.x > width || p.y < 0 || p.y > height) {
                projectiles.splice(i, 1);
                continue;
            }

            // 투사체-적 충돌 검사
            for (let j = enemies.length - 1; j >= 0; j--) {
                let e = enemies[j];
                let dist = Math.hypot(p.x - e.x, p.y - e.y);
                if (dist < p.radius + e.radius) {
                    enemies.splice(j, 1);
                    projectiles.splice(i, 1);
                    score += 10;
                    scoreEl.innerText = score;
                    break; // 하나의 투사체는 하나의 적만 맞춤
                }
            }
        }

        // 적 관리
        // 난이도 상승: 시간에 따라 스폰 속도 증가
        let spawnRate = Math.max(200, 2000 - gameTime * 50);
        if (timestamp - lastEnemySpawnTime > spawnRate) {
            spawnEnemy();
            lastEnemySpawnTime = timestamp;
        }

        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            let angle = Math.atan2(player.y - e.y, player.x - e.x);
            e.x += Math.cos(angle) * e.speed;
            e.y += Math.sin(angle) * e.speed;

            ctx.beginPath();
            ctx.arc(e.x, e.y, e.radius, 0, Math.PI * 2);
            ctx.fillStyle = '#f00'; // 빨간색
            ctx.fill();
            ctx.closePath();

            // 적-플레이어 충돌 검사 (게임 오버)
            let dist = Math.hypot(player.x - e.x, player.y - e.y);
            if (dist < player.radius + e.radius) {
                gameOver();
                return;
            }
        }

        animationId = requestAnimationFrame(update);
    }

    function gameOver() {
        isGameOver = true;
        cancelAnimationFrame(animationId);
        
        ctx.fillStyle = 'rgba(0,0,0,0.7)';
        ctx.fillRect(0, 0, width, height);
        
        ctx.fillStyle = 'white';
        ctx.font = '40px sans-serif';
        ctx.textAlign = 'center';
        ctx.fillText('GAME OVER', width/2, height/2);
        ctx.font = '20px sans-serif';
        ctx.fillText('Final Score: ' + score, width/2, height/2 + 40);
        ctx.fillText('Time Survived: ' + gameTime + 's', width/2, height/2 + 70);
        
        // 재시작 버튼 대용 클릭 이벤트
        window.addEventListener('click', restart, {once: true});
    }
    
    function restart() {
        enemies = [];
        projectiles = [];
        score = 0;
        gameTime = 0;
        scoreEl.innerText = score;
        timeEl.innerText = gameTime;
        player = { x: width / 2, y: height / 2, radius: 15, speed: 5 };
        isGameOver = false;
        lastEnemySpawnTime = 0;
        animationId = requestAnimationFrame(update);
    }

    // --- 게임 시작 ---
    animationId = requestAnimationFrame(update);

</script>
</body>
</html>
