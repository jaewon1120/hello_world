<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Survival Arena Advanced</title>
    <style>
        body { margin: 0; background: #000; color: #fff; overflow: hidden; font-family: 'Arial'; }
        #ui { position: absolute; top: 10px; left: 10px; z-index: 10; }
        #levelUpMenu { 
            position: absolute; top: 30%; left: 30%; width: 40%; background: #222; 
            padding: 20px; border: 2px solid #fff; display: none; text-align: center;
        }
        button { padding: 10px; margin: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="ui">HP: <span id="hp">3</span> | Lv: <span id="lv">1</span> | Exp: <span id="exp">0</span></div>
    
    <div id="levelUpMenu">
        <h2>레벨업! 보상을 선택하세요</h2>
        <div id="options"></div>
    </div>
    <canvas id="game"></canvas>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth; canvas.height = window.innerHeight;

// 게임 상태 객체
let game = {
    player: { x: canvas.width/2, y: canvas.height/2, hp: 3, lv: 1, exp: 0, weapon: 'pistol' },
    isPaused: false
};

// 1. 레벨업 보상 데이터
const rewards = {
    common: [
        { name: "HP +1 회복", action: () => game.player.hp++ },
        { name: "보호막 +1", action: () => game.player.shield = 1 },
        { name: "연사 속도 증가", action: () => console.log("Fire rate up") }
    ],
    rare: [
        { name: "원거리 드론 소환", action: () => console.log("Drone spawned") },
        { name: "근거리 드론 소환", action: () => console.log("Melee drone spawned") }
    ]
};

// 2. 레벨업 메뉴 로직
function showLevelUp() {
    game.isPaused = true;
    const menu = document.getElementById('levelUpMenu');
    const options = document.getElementById('options');
    options.innerHTML = '';
    
    // 무기 선택 조건 (5레벨 달성 시)
    if (game.player.lv === 5) {
        addOption("돌격소총 선택", () => equipWeapon('assault'));
        addOption("샷건 선택", () => equipWeapon('shotgun'));
    } else {
        // 일반 보상 3개 랜덤 추출
        rewards.common.forEach(r => addOption(r.name, r.action));
    }
    menu.style.display = 'block';
}

function addOption(text, callback) {
    const btn = document.createElement('button');
    btn.innerText = text;
    btn.onclick = () => { callback(); closeMenu(); };
    document.getElementById('options').appendChild(btn);
}

function closeMenu() {
    document.getElementById('levelUpMenu').style.display = 'none';
    game.isPaused = false;
}

function equipWeapon(type) {
    game.player.weapon = type;
    console.log("무기 교체: " + type);
}

// 3. 게임 루프 (단순화)
function loop() {
    if(!game.isPaused) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        // 플레이어, 몬스터, 사격 로직 등
    }
    
    // 임시 테스트: 100 경험치마다 레벨업
    if (game.player.exp >= 100) {
        game.player.lv++;
        game.player.exp = 0;
        showLevelUp();
    }
    requestAnimationFrame(loop);
}

// 테스트용 레벨업 호출 (콘솔에서 testLevelUp() 입력)
window.testLevelUp = () => game.player.exp = 100;
loop();
</script>
</body>
</html>
